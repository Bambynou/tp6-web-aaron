<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFCV : Contact</title>
  <link rel="stylesheet" href="stylesheet.css" type="text/css">
</head>
<body>
<header id="top">
  <img class="logo" src="images/logo.png" alt="Logo SFCV">
  <h1>SFCV</h1>
  <h2>Spécialiste Français n°1 des caves à vin</h2>
  <h3>N°1 des caves à vin</h3>
</header>
<hr>
<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="produits.html">Produits</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>
<article>
  <h2>Demande de catalogue gratuit</h2>
  <form action="mailto:contact@sfcv.com" method="post" enctype="text/plain" name="demande" id="demande">
    <table>
      <tr>
        <td>Civilité</td>
        <td>
          <label><input type="radio" name="civilite" id="civilite_m" value="1" checked> Monsieur</label>
          <label><input type="radio" name="civilite" id="civilite_mm" value="2"> Madame</label>
      <tr>
        <td><label for="nom">Nom</label></td>
        <td><input type="text" name="nom" id="nom" value="" size="40"></td>
      </tr>
      <tr>
        <td><label for="prenom">Prénom</label></td>
        <td><input type="text" name="prenom" id="prenom" value="" size="40"></td>
      </tr>
      <tr>
        <td><label for="adresse">Adresse</label></td>
        <td><textarea name="adresse" id="adresse" rows="4" cols="42"></textarea></td>
      </tr>
      <tr>
        <td><label for="ville">Ville</label></td>
        <td><input type="text" name="ville" id="ville" value="" size="40"></td>
      </tr>
      <tr>
        <td><label for="codepostal">Code postal</label></td>
        <td><input type="text" name="codepostal" id="codepostal" value="" size="10"></td>
      </tr>
      <tr>
        <td><label for="email">Adresse email</label></td>
        <td><input type="email" name="email" id="email" value="" size="40"></td>
      </tr>
      <tr>
        <td>Newsletter</td>
        <td><label><input type="checkbox" name="newslettre" id="newslettre" value="oui"> Je souhaite recevoir la newsletter SFCV</label></td>
      </tr>
      <tr>
        <td>Message</td>
        <td><textarea name="message" id="message" rows="5" cols="42">Merci de m'envoyer votre catalogue gratuit.</textarea></td>
      </tr>
      <tr>
        <td></td>
        <td><input type="submit" name="action" id="action" value="Envoyer"></td>
      </tr>
    </table>
  </form>

  <div id="contact">
    <div id="bloc_contact">
      <table>
        <tr>
          <td><img src="images/txt_call.jpg" alt="Appelez-nous"></td>
        </tr>
        <tr>
          <td><a href="tel:0387145635"><img src="images/bouton_call_off.gif" alt="Téléphone"></a></td>
        </tr>
        <tr>
          <td><img src="images/txt_email.jpg" alt="Email"></td>
        </tr>
        <tr>
          <td><a href="mailto:contact@sfcv.com"><img src="images/bouton_email_off.gif" alt="Email"></a></td>
        </tr>
      </table>
    </div>
  </div>
</article>
<hr>
<footer>
  <p><a class="backlink" href="mentions.html">Mentions légales</a></p>
</footer>
</body>
</html>
